# ===================================================================
# Sunbird Serve Fulfill - Application Configuration
# All environment-specific values are driven by environment variables
# with sensible local development defaults.
# ===================================================================

# Server Configuration
server.port=${SERVER_PORT:8090}
server.servlet.context-path=/api/v1/serve-fulfill/
server.error.include-exception=${ERROR_INCLUDE_EXCEPTION:false}
server.error.include-stacktrace=${ERROR_INCLUDE_STACKTRACE:never}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/serve}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database=POSTGRESQL
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# External Service URLs
serve.url=${SERVE_URL:https://serve-v1.evean.net}
serve.need.url=${SERVE_NEED_URL:https://serve-v1.evean.net}
serve.volunteering.url=${SERVE_VOLUNTEERING_URL:https://serve-v1.evean.net}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://serve-v1.evean.net}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*,Authorization,Content-Type,X-Requested-With,Accept,Origin
cors.allow-credentials=true
cors.max-age=3600

# Logging Configuration
logging.level.com.sunbird.serve.fulfill=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING:WARN}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:WARN}
logging.level.reactor.netty.http.client.HttpClient=${LOG_LEVEL_NETTY:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %c{1.} [%t] %m%n
logging.file.name=appLog.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %c{1.} [%t] %m%n

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger / OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
